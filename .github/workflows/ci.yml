name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install flake8

      - name: Lint with flake8
        run: flake8 app tests --max-line-length=100

      - name: Run tests
        run: pytest -v

      - name: Build Docker image
        run: docker build -t cicd-learning:${{ github.sha }} .

      - name: Run container and test endpoint
        run: |
          docker run -d -p 5000:5000 --name test-container cicd-learning:${{ github.sha }}
          sleep 3
          curl --fail http://localhost:5000/health
          docker stop test-container
